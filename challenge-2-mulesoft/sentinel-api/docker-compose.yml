services:
  sentinel-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_NAME=DigitalServiceDataStore
      - DB_USER=sa
      - DB_PASSWORD=${DB_PASSWORD:-YourStrong!Passw0rd}
      - DB_TRUST_CERT=true
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  # Azure SQL Edge for local development (ARM64 / x64 compatible)
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${DB_PASSWORD:-YourStrong!Passw0rd}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqldata:
